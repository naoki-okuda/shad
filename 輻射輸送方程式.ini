
輻射輸送方程式って、かなり直感的に与えていないか？粒子集団のボルツマン方程式は一応、古典力学のリウヴィル方程式から出発して、自然に出て来るわけだが、（階層性は非自明だが。）それに対して、輻射輸送ってエネルギー保存、運動量保存、電磁波の直進性といった直感から導いていて、マクスウェル方程式を介していないように見える。


結論：
**はい、輻射輸送方程式（Radiative Transfer Equation, RTE）は、ボルツマン方程式に比べると「直感的に」導かれており、マクスウェル方程式そのものからは直接導かれていない。**
ただし深いところでは、

* 幾何光学近似（short-wavelength limit）
* ポイント状フォトンの概念（光の粒子モデル）
* 散乱過程のミクロ断面積
* コヒーレンスの喪失（位相平均）
* Wigner分布のような位相空間表現

を通じて **電磁場の統計的平均としてボルツマン型の式が出てくる**。
つまり「直感的形式」は“正統派の導出”（Maxwell → Wigner → Boltzmann）を強く近似したものになっている。

以下で、君が感じている「違和感」がどこから来ているのか、体系的に説明する。



# ■ 1. 粒子ボルツマン方程式の出自：Liouville → BBGKY → Boltzmann

粒子系は：

1. **Liouville方程式**（位相空間での厳密な力学）
2. BBGKY階層
3. 分子カオス仮定
4. → **ボルツマン方程式**

という流れで、
「ハミルトニアン力学＝微分方程式」という非常に厳密な構造の上に立っている。

これは
**古典力学の第一原理 → 輸送方程式**
という完全な first-principle の流れ。



# ■ 2. 一方、輻射輸送方程式はどうか？

教科書的導出は

[
\frac{1}{c}\frac{\partial I_\nu}{\partial t}+\hat{n}\cdot\nabla I_\nu
= -\kappa_\nu I_\nu + j_\nu + \text{散乱項}
]

という形で、

* 指向性をもつ輝度 (I_\nu(\mathbf{x},\hat{n}))
* 左辺は直進（free streaming）
* 右辺は吸収、放射、散乱

という「直感的なバランス式」として書かれる。

確かにこれは **マクスウェル方程式の解の統計ではない**。

なぜこんなに“直感的”なのか？



# ■ 3. 理由1：光を **粒子（フォトン）** とみなすことで Boltzmann型に落としたから

* マクスウェル方程式は波動
* ボルツマン方程式は粒子

**輻射輸送方程式は“フォトンのボルツマン方程式”** であって、波動性は全部捨てている。

そのため前提に強い近似が必要：

* 光の波長 ≪ 系の空間スケール（幾何光学近似）
* 位相相関が壊れている（散乱でコヒーレンスが失われる）
* 波干渉や偏光コヒーレンスの影響を平均化

この結果、「フォトンビームが直線状に進む」→左辺の streaming term が出る。

なので輻射輸送は
**Maxwell → 波動パケット → フォトン粒子化 → Boltzmann**
という強力な coarse-graining の産物です。

---

# ■ 4. 理由2：電磁場を統計的エネルギー流として扱う → マクスウェル方程式の複雑さが消える

輻射輸送で扱うのは

* エネルギー流
* 指向性エネルギー密度 (I_\nu)
* パワーバランス

であって、

* E, B の位相
* コヒーレント干渉
* Maxwell の波面構造

は扱わない。

つまり、**電磁場の“確率流”だけを抜きだしたもの**。

このため、マクスウェル方程式をきちんと使っているように見えない。

---

# ■ 5. しかし実は Maxwell から“ボルツマン型輸送”を導ける

本当に厳密にやると：

## (A) Maxwell → Wigner distribution (W(\mathbf{x},\mathbf{k}))

電磁場の Wigner 関数をつくると、これは「位相空間における波動の確率密度」みたいなものになる。

## (B) 幾何光学極限（λ→0）で Liouville 方程式が出る

[
\partial_t W + \nabla_k \omega\cdot \nabla_x W - \nabla_x \omega \cdot \nabla_k W
= \text{散乱源}
]

これは**完全にボルツマン型の輸送方程式**。

## (C) 散乱項にミクロ断面積を入れると RTE が出る

吸収係数 (\kappa_\nu) や放射係数 (j_\nu) は
微視的な原子遷移・電子衝突・誘導放出などの**量子遷移確率**から出る。

つまりマクスウェル方程式と量子電磁気学を coarse-grain した結果が RTE。

---

# ■ 6. だから君の感覚は正しい

> 輻射輸送って、直感から書いていて、マクスウェル方程式を介さないように見える

→ **その通り**。
数学的な第一原理（Liouville のような）から直接書いているわけではなく、
すでに“フォトン粒子モデル”に coarse-grain した後の式。

言い換えると：

* ボルツマン方程式は「first-principle にかなり近い」
* 輻射輸送方程式は「物理的直感（局所エネルギー収支）に基づく phenomenological equation」
* 深いところでは Maxwell + 確率的散乱 → Boltzmann 型になる

という階層の違い。

---

# ■ 7. まとめ（短く）

* **輻射輸送方程式は“フォトンのボルツマン方程式”の近似**
* Maxwell 方程式から直接出てくるわけではない
* 幾何光学近似＋位相平均化＋量子遷移確率を経てやっと理論的根拠が得られる
* 粒子ボルツマン方程式ほど第一原理的ではない
* よって教科書的導出は“直感的で phenomenological”に見える

---

必要なら：

* Maxwell → Wigner → Radiative Transfer の厳密導出
* Coherent light では RTE が破綻する例（LASER transport）
* PIC/FOkker-Planckとのアナロジー

なども詳しくできるよ。
